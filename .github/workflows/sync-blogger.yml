name: Sync to Blogger

on:
  push:
    branches: [main]
    paths:
      - 'src/poems/**'
      - '.poetic-config.yaml'
      - 'src/tools/sync-blogger.js'
      - '.github/workflows/sync-blogger.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview without writing to Blogger'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: sync-blogger
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check feature flag
        id: precheck
        run: |
          # Read a subkey nested one level under a top-level block, e.g. the
          # `sync` in `blogger:\n  sync: true`. Mirrors the skip_paths
          # block-scoping in scripts/sync-framework.sh.
          yaml_subkey() {
            awk -v block="$2" -v key="$3" '
              $0 ~ "^"block":[[:space:]]*$" { in_block=1; next }
              in_block && /^[^[:space:]]/ { in_block=0 }
              in_block && $0 ~ "^[[:space:]]+"key":" {
                sub("^[[:space:]]+"key":[[:space:]]*", "");
                gsub(/^["'"'"']|["'"'"']$/, "");
                print;
                exit
              }
            ' "$1"
          }

          blogger_sync=""
          [ -f .poetic-config.yaml ] && blogger_sync=$(yaml_subkey .poetic-config.yaml blogger sync)
          if [ "$blogger_sync" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Blogger sync disabled. Set 'blogger: { sync: true }' in .poetic-config.yaml to enable."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        if: steps.precheck.outputs.skip == 'false'
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.precheck.outputs.skip == 'false'
        run: npm ci

      - name: Build poems
        if: steps.precheck.outputs.skip == 'false'
        run: npm run build

      - name: Publish to Blogger
        if: steps.precheck.outputs.skip == 'false'
        env:
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
        run: node src/tools/sync-blogger.js ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
