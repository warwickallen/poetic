name: Build and Deploy Poems to GitHub Pages

# The `build` job below is a required status check, so this workflow must
# trigger on every push/PR to main regardless of what changed — a `paths:`
# filter on the trigger itself would make the check silently disappear
# (stuck as "Expected" forever, blocking merge) for a PR that only touches
# paths outside the filter, e.g. a doc-only PR editing CLAUDE.md or
# SECURITY.md. See GitHub's "Handling skipped but required checks":
# https://docs.github.com/en/actions/using-workflows/using-conditions-to-control-job-execution#handling-skipped-but-required-checks
#
# Instead, the `build` job always triggers and always reports a real "build"
# status, but its actual steps (install/test/lint/build/deploy) are skipped
# via the "Check whether build-relevant paths changed" step below whenever
# nothing under the relevant path list changed. That list exists exactly
# once, here, purely to decide whether to skip — there is no second,
# separately-triggered workflow with its own inverse path list to keep in
# sync by hand.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# Cancel in-progress runs to ensure the latest commit is always deployed
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages: ${{ steps.precheck.outputs.pages }}
      relevant: ${{ steps.changes.outputs.relevant }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check whether build-relevant paths changed
        id: changes
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          else
            # workflow_dispatch (or any other event): no meaningful diff to
            # compute, so always run the real build.
            base=""
            head=""
          fi

          relevant=true
          if [ -n "$base" ] && [ "$base" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -e "${base}^{commit}" 2>/dev/null; then
            relevant=false
            while IFS= read -r file; do
              case "$file" in
                src/poems/*|src/templates/*|src/tools/*|editors/*|test/*|package.json|package-lock.json|eslint.config.js|.editorconfig|.github/workflows/*|.poetic-config.yaml)
                  relevant=true
                  ;;
              esac
            done < <(git diff --name-only "$base" "$head")
          fi

          echo "Build-relevant paths changed: $relevant"
          echo "relevant=$relevant" >> "$GITHUB_OUTPUT"

      - name: Check if this is a user repo
        id: precheck
        run: |
          if [ -f .poetic-version ]; then
            echo "pages=true" >> "$GITHUB_OUTPUT"
          else
            echo "pages=false" >> "$GITHUB_OUTPUT"
            echo "No .poetic-version — build will run but Pages deployment is skipped (this is the poetic framework repo)."
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        if: steps.changes.outputs.relevant == 'true'
        run: npm ci

      # Ensure a full vim (with +syntax) is present so test/vim-syntax.test.js
      # actually runs instead of self-skipping.
      - name: Install vim
        if: steps.changes.outputs.relevant == 'true'
        run: sudo apt-get update && sudo apt-get install -y vim

      - name: Run tests
        if: steps.changes.outputs.relevant == 'true'
        run: npm test

      - name: Lint
        if: steps.changes.outputs.relevant == 'true'
        run: npm run lint

      - name: Check for trailing whitespace
        if: steps.changes.outputs.relevant == 'true'
        run: npm run check

      - name: Build poems
        if: steps.changes.outputs.relevant == 'true'
        run: npm run build

      - name: Check for build artifacts
        if: steps.changes.outputs.relevant == 'true'
        run: npm run check:build

      - name: Setup Pages
        if: steps.changes.outputs.relevant == 'true' && steps.precheck.outputs.pages == 'true'
        uses: actions/configure-pages@v6

      - name: Prepare deployment structure
        if: steps.changes.outputs.relevant == 'true' && steps.precheck.outputs.pages == 'true'
        run: |
          # Create a deployment directory structure
          mkdir -p deployment/public
          # Copy all public files to the deployment/public directory
          cp -r public/* deployment/public/
          # Copy essential files to root for direct access
          cp public/index.html deployment/
          cp public/all-poems.html deployment/
          cp public/poetic.css deployment/
          cp public/poetic.js deployment/
          cp public/date-utils.js deployment/
          cp public/all-poems.js deployment/
          cp public/index.js deployment/
          [ -f public/custom.css ] && cp public/custom.css deployment/
          # Copy image assets to root so favicon hrefs resolve from root-level HTML files
          find public -maxdepth 1 -type f \( -name "*.svg" -o -name "*.png" -o -name "*.ico" -o -name "*.webp" \) -exec cp {} deployment/ \;
          # Copy all individual poem HTML redirect stubs to root for GitHub Pages access
          find public -maxdepth 1 -name "*.html" -type f -exec cp {} deployment/ \;
          # Copy per-poem directories so clean URLs (/bounce/) resolve
          find public -mindepth 1 -maxdepth 1 -type d ! -name raw -exec cp -r {} deployment/ \;
          # Raw poem file access
          mkdir -p deployment/public/raw
          cp public/raw/index.html deployment/public/raw/index.html
          # Display results
          echo "Deployment structure created:"
          if $(type tree >/dev/null 2>&1); then
            tree -s deployment
          else
            find deployment -type f -ls
          fi | head -500

      - name: Upload artifact
        id: upload
        if: steps.changes.outputs.relevant == 'true' && steps.precheck.outputs.pages == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./deployment"

      - name: Verify artifact upload
        if: steps.changes.outputs.relevant == 'true' && steps.precheck.outputs.pages == 'true'
        run: |
          echo "✅ Artifact uploaded successfully"
          echo "Deployment structure verification:"
          echo "Root files:"
          ls -la deployment/
          echo "Public directory files:"
          ls -la deployment/public/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && needs.build.outputs.pages == 'true' && needs.build.outputs.relevant == 'true'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
