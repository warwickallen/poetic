name: Build and Deploy Poems to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/poems/**'
      - 'src/templates/**'
      - 'src/tools/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
      - '.poetic-config'
  pull_request:
    branches: [main]
    paths:
      - 'src/poems/**'
      - 'src/templates/**'
      - 'src/tools/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
      - '.poetic-config'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# Cancel in-progress runs to ensure the latest commit is always deployed
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages: ${{ steps.precheck.outputs.pages }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if this is a user repo
        id: precheck
        run: |
          if [ -f .poetic-version ]; then
            echo "pages=true" >> "$GITHUB_OUTPUT"
          else
            echo "pages=false" >> "$GITHUB_OUTPUT"
            echo "No .poetic-version — build will run but Pages deployment is skipped (this is the poetic framework repo)."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Build poems
        run: npm run build

      - name: Check for build artifacts
        run: |
          echo "Checking for generated files..."
          echo "Current directory contents:"
          ls -la
          echo "Public directory contents:"
          ls -la public/
          echo "File sizes:"
          ls -lh public/index.html public/all-poems.html public/poetic.css public/custom.css 2>/dev/null || echo "Files not found"
          if [ ! -f "public/index.html" ]; then
            echo "❌ public/index.html was not generated"
            exit 1
          fi
          if [ ! -f "public/all-poems.html" ]; then
            echo "❌ public/all-poems.html was not generated"
            exit 1
          fi
          if [ ! -f "public/poetic.css" ]; then
            echo "❌ public/poetic.css was not found"
            exit 1
          fi
          echo "✅ All build artifacts generated successfully"
          echo "File contents preview:"
          head -5 public/index.html
          echo "..."
          head -5 public/all-poems.html

      - name: Setup Pages
        if: steps.precheck.outputs.pages == 'true'
        uses: actions/configure-pages@v4

      - name: Prepare deployment structure
        if: steps.precheck.outputs.pages == 'true'
        run: |
          # Create a deployment directory structure
          mkdir -p deployment/public
          # Copy all public files to the deployment/public directory
          cp -r public/* deployment/public/
          # Copy essential files to root for direct access
          cp public/index.html deployment/
          cp public/all-poems.html deployment/
          cp public/poetic.css deployment/
          cp public/poetic.js deployment/
          [ -f public/custom.css ] && cp public/custom.css deployment/
          # Copy image assets to root so favicon hrefs resolve from root-level HTML files
          find public -maxdepth 1 -type f \( -name "*.svg" -o -name "*.png" -o -name "*.ico" -o -name "*.webp" \) -exec cp {} deployment/ \;
          # Copy all individual poem HTML redirect stubs to root for GitHub Pages access
          find public -maxdepth 1 -name "*.html" -type f -exec cp {} deployment/ \;
          # Copy per-poem directories so clean URLs (/bounce/) resolve
          find public -mindepth 1 -maxdepth 1 -type d ! -name raw -exec cp -r {} deployment/ \;
          # Raw poem file access
          mkdir -p deployment/public/raw
          cp public/raw/index.html deployment/public/raw/index.html
          # Display results
          echo "Deployment structure created:"
          if $(type tree >/dev/null 2>&1); then
            tree -s deployment
          else
            find deployment -type f -ls
          fi | head -500

      - name: Upload artifact
        id: upload
        if: steps.precheck.outputs.pages == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./deployment"

      - name: Verify artifact upload
        if: steps.precheck.outputs.pages == 'true'
        run: |
          echo "✅ Artifact uploaded successfully"
          echo "Deployment structure verification:"
          echo "Root files:"
          ls -la deployment/
          echo "Public directory files:"
          ls -la deployment/public/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && needs.build.outputs.pages == 'true'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
