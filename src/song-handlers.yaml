# Builtin song handlers shipped with the Poetic framework.
#
# A handler maps a music service named in a poem's audio section (e.g. a line
# "Audiomack" or "Suno: s/xyz") to markup. Handlers are declarative — URL
# templates and labels only. Styling is NOT defined here; it lives in
# public/poetic.css (framework) and public/custom.css (consumer), keyed off the
# generated classes .song-item--<name> / .song-embed--<name> / .song-link--<name>.
#
# Consumers add or override handlers under `song_handlers:` in
# .poetic-config.yaml (a user handler of the same name replaces the builtin).
# Adding a service should need only YAML + CSS — never framework code.
#
# Each handler defines at least one of:
#   link_url  / link_label    -> a plain anchor
#   embed_url / button_label  -> a lazy-loaded iframe (built on click by poetic.js)
#
# {token} placeholders in the URL templates are resolved at build time against:
#   {value}                          the text after the service name (empty for a
#                                    bare line such as "Audiomack")
#   {slug} {title} {author} {date}   poem context
#   {<top-level config key>}         any scalar at the top level of .poetic-config.yaml
#   {<handler field>}                any scalar set on this handler itself — including
#                                    ones added only by a consumer override, e.g. the
#                                    builtin audiomack handler's {artist} token, which
#                                    a consumer supplies via song_handlers.audiomack.artist
# A fallback chain {a|b} resolves to the first token that is non-empty, so
# {value|slug} means "the author's value, or the poem slug if none was given".
#
# Embed player size is configurable (see docs/BUILD.md). A handler that serves a
# single kind of media sets `embed_height` OR `embed_aspect_ratio` directly. A
# handler that serves several media kinds (e.g. mega: audio and video) sets
# `default_media` plus a `media_sizes` map of per-type size profiles, each being
# a `height` OR an `aspect_ratio`. An author may override the size per song with
# a trailing `(audio|video|ratio=…|height=…)` param list on the audio line.
#
# A handler may set `embed_allow` and/or `embed_allowfullscreen` to override the
# iframe's `allow="…"` / `allowfullscreen` attributes for its own embeds; either
# left unset falls back to poetic.js's global default
# (`autoplay; fullscreen; picture-in-picture; encrypted-media` + `allowfullscreen`).
#
# Consumers override handlers under `song_handlers:` in .poetic-config.yaml. The
# override deep-merges key-by-key into the builtin (nested maps like
# `media_sizes` merge recursively); a `null` value deletes a key. So a consumer
# can retune just `media_sizes.audio.height` without redeclaring `embed_url`.
#
# `value_patterns` (all three builtins below) is an ordered list of
# `{ match, value? }` entries tried against the raw audio-line value before it
# is substituted into embed_url/link_url — see the docblock in
# src/tools/song-handlers.js for the full mechanism. It exists so an author can
# paste any amount of a service's own URL, from a bare ID up to a full share
# link, and have the rest inferred. A value that matches none of a handler's
# patterns (including a plain slug override, e.g. `Audiomack: my-shepherd`) is
# used exactly as written.

audiomack:
  # {artist} has no builtin value — a consumer supplies it via
  # song_handlers.audiomack.artist in .poetic-config.yaml.
  embed_url: "https://audiomack.com/embed/{artist}/song/{value|slug}"
  button_label: "🎵 Load Audiomack Player"
  embed_height: "252px"
  value_patterns:
    # "[…audiomack.com/][embed/]<artist>/[song/]<slug>" — accepts a pasted full
    # or partial Audiomack URL and infers the artist + song slug from however
    # much of it is given. A bare single-segment value (no "/") doesn't match
    # this and falls through unchanged, i.e. it overrides only the slug, e.g.
    # `Audiomack: my-shepherd` (artist stays whatever song_handlers.audiomack.artist
    # says); `Audiomack: my_other_account/song/my-shepherd` overrides both.
    - match: '^(?:(?:https?://)?(?:www\.)?audiomack\.com/)?(?:embed/)?(?<artist>[^/?#]+)/(?:song/)?(?<value>[^/?#]+)/?$'

suno:
  link_url: "https://suno.com/{value}"
  link_label: "recording on Suno"
  value_patterns:
    # A full/partial suno.com URL is reduced to its "s/<id>" or "song/<uuid>" tail.
    - match: '^(?:(?:https?://)?(?:www\.)?suno\.com/)?(?<value>(?:s|song)/.+)$'
    # A bare 16-character alphanumeric ID (the short-link form) infers "s/".
    - match: '^(?<id>[A-Za-z0-9]{16})$'
      value: "s/{id}"
    # A bare UUID (8-4-4-4-12 hex) infers "song/" (the full-link form).
    - match: '^(?<uuid>[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})$'
      value: "song/{uuid}"

mega:
  embed_url: "https://mega.nz/embed/{value}"
  button_label: "🎵 Load MEGA Player"
  default_media: audio
  media_sizes:
    # MEGA renders an audio file as a ~square cover-art viewport (not a thin
    # control bar), so a 1/1 ratio shows the artwork fully and stays responsive;
    # video is 16:9. Override per song with (ratio=…)/(height=…), or per consumer
    # in .poetic-config.yaml.
    audio: { aspect_ratio: "1 / 1" }
    video: { aspect_ratio: "16 / 9" }
  value_patterns:
    # A pasted full/partial MEGA share URL ("[…mega.nz/][file/]<id>#<key>") is
    # reduced to the bare "<id>#<key>" identifier embed_url expects.
    - match: '^(?:(?:https?://)?(?:www\.)?mega\.nz/)?(?:file/)?(?<value>[^/?#]+#.+)$'
